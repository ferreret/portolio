name: Update activity ticker

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Fetch GitHub activity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: ferreret
        run: node scripts/fetch-activity.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet public/activity.json; then
            echo "No activity changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/activity.json
            git commit -m "chore(activity): refresh ticker data"
            git push
          fi

      - name: Fast-forward production to main
        # Deploy branch is `production` (Dokploy). Keep it in sync with main so
        # the ticker refresh actually reaches production. Fails loudly if the
        # branches ever diverge (non-fast-forward), which is the desired signal.
        run: git push origin HEAD:production
